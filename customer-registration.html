<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAS Bay - Register Customer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">OYERA</div>

        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="dashboard.html" class="nav-link">Service Records</a>
            <a href="customers.html" class="nav-link">Customers</a>
            <a href="customer-registration.html" class="nav-link active">Register Customer</a>
            <a href="technician-registration.html" class="nav-link">Register Technician</a>
        </div>

        <a href="#" class="logout-link">Logout</a>
    </div>

    <!-- Main Section -->
    <div class="main">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Register New Customer</h4>
            <div class="avatar">P</div>
        </div>

        <div class="card border-0 rounded-3 p-4">

            <p class="text-muted mb-4">Fill in the details below to register a new customer into the system.</p>

            <form id="customerForm">

                <!-- Personal Information -->
                <h6 class="form-section-title">Personal Information</h6>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="fullName" placeholder="e.g. James Okello" required>
                    </div>
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="e.g. james@email.com">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" placeholder="e.g. 0770 123 456" required>
                    </div>
                    <div class="col-md-6">
                        <label for="address" class="form-label">Address / Location</label>
                        <input type="text" class="form-control" id="address" placeholder="e.g. Ntinda, Kampala">
                    </div>
                </div>

                <!-- Vehicle Information -->
                <h6 class="form-section-title mt-4">Vehicle Information</h6>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="numberPlate" class="form-label">Number Plate</label>
                        <input type="text" class="form-control" id="numberPlate" placeholder="e.g. UAX 234B" required>
                    </div>
                    <div class="col-md-6">
                        <label for="carType" class="form-label">Car Type</label>
                        <select class="form-select" id="carType" required>
                            <option value="" disabled selected>Select car type</option>
                            <option value="Small">Small</option>
                            <option value="Commercial">Commercial</option>
                            <option value="Heavy">Heavy</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="carModel" class="form-label">Car Make &amp; Model</label>
                        <input type="text" class="form-control" id="carModel" placeholder="e.g. Toyota Corolla 2018">
                    </div>
                    <div class="col-md-6">
                        <label for="engineType" class="form-label">Engine Type</label>
                        <select class="form-select" id="engineType">
                            <option value="" disabled selected>Select engine type</option>
                            <option value="Petrol">Petrol</option>
                            <option value="Diesel">Diesel</option>
                            <option value="Hybrid">Hybrid</option>
                            <option value="Electric">Electric</option>
                        </select>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn px-4">Register Customer</button>
                    <button type="reset" class="btn-outline px-4">Clear Form</button>
                </div>

            </form>

        </div>
    </div>

    <script>
        document.getElementById('customerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Customer registered successfully!');
            this.reset();
        });
    </script>

</body>
</html>
