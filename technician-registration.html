<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAS Bay - Register Technician</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">OYERA</div>

        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="dashboard.html" class="nav-link">Service Records</a>
            <a href="customers.html" class="nav-link">Customers</a>
            <a href="customer-registration.html" class="nav-link">Register Customer</a>
            <a href="technician-registration.html" class="nav-link active">Register Technician</a>
        </div>

        <a href="#" class="logout-link">Logout</a>
    </div>

    <!-- Main Section -->
    <div class="main">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Register New Technician</h4>
            <div class="avatar">P</div>
        </div>

        <div class="card border-0 rounded-3 p-4">

            <p class="text-muted mb-4">Fill in the details below to add a new technician to the team.</p>

            <form id="technicianForm">

                <!-- Personal Information -->
                <h6 class="form-section-title">Personal Information</h6>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="fullName" placeholder="e.g. David Mukasa" required>
                    </div>
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="e.g. david@email.com">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" placeholder="e.g. 0780 456 789" required>
                    </div>
                    <div class="col-md-6">
                        <label for="ninNumber" class="form-label">NIN / ID Number</label>
                        <input type="text" class="form-control" id="ninNumber" placeholder="e.g. CM12345678ABCDE" required>
                    </div>
                </div>

                <!-- Professional Details -->
                <h6 class="form-section-title mt-4">Professional Details</h6>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="specialization" class="form-label">Specialization</label>
                        <select class="form-select" id="specialization" required>
                            <option value="" disabled selected>Select specialization</option>
                            <option value="Engine & Transmission">Engine &amp; Transmission</option>
                            <option value="Brakes & Suspension">Brakes &amp; Suspension</option>
                            <option value="Electrical Systems">Electrical Systems</option>
                            <option value="Body Work & Painting">Body Work &amp; Painting</option>
                            <option value="General Maintenance">General Maintenance</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="experience" class="form-label">Years of Experience</label>
                        <input type="number" class="form-control" id="experience" placeholder="e.g. 5" min="0" max="50" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="availability" class="form-label">Availability</label>
                        <select class="form-select" id="availability">
                            <option value="" disabled selected>Select availability</option>
                            <option value="Full-time">Full-time</option>
                            <option value="Part-time">Part-time</option>
                            <option value="Contract">Contract</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="startDate" class="form-label">Start Date</label>
                        <input type="date" class="form-control" id="startDate">
                    </div>
                </div>

                <!-- Additional Notes -->
                <div class="mb-3">
                    <label for="notes" class="form-label">Additional Notes</label>
                    <textarea class="form-control" id="notes" rows="3" placeholder="Any relevant certifications, skills, or notes..."></textarea>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn px-4">Register Technician</button>
                    <button type="reset" class="btn-outline px-4">Clear Form</button>
                </div>

            </form>

        </div>
    </div>

    <script>
        document.getElementById('technicianForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Technician registered successfully!');
            this.reset();
        });
    </script>

</body>
</html>
